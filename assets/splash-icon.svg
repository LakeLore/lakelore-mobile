<!--
  LakeLore splash icon — 1024×1024, transparent.
  Shown centered on splash backgroundColor (set to #f4efe4 in app.json)
  with resizeMode "contain" — design is rendered at the icon center.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Transparent background; splash backgroundColor fills the surround. -->

  <!-- Medallion outline -->
  <circle cx="512" cy="512" r="380" stroke="#1a1f2a" stroke-width="16" fill="none"/>

  <!-- Waterline -->
  <line x1="180" y1="615" x2="844" y2="615" stroke="#1a1f2a" stroke-width="14"/>

  <!-- Depth contour (dashed) -->
  <line x1="180" y1="695" x2="844" y2="695" stroke="#1a1f2a" stroke-width="8" stroke-dasharray="20 38"/>

  <!-- Fishing hook -->
  <path d="M380 280 L380 560 Q380 660 480 660 L600 660"
        stroke="#1a1f2a" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Hook barb -->
  <path d="M540 660 L600 660 L580 619"
        stroke="#1a1f2a" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Walleye gold eye -->
  <circle cx="664" cy="384" r="44" fill="#c89a3c"/>
</svg>
