<!--
  LakeLore app icon — 1024×1024, full-bleed.
  Apple rounds corners (~22% radius); design content sits within the
  inner ~80% safe zone so the medallion outline isn't clipped.
  Source: scaled from web/public/favicon.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Cream paper background, full bleed -->
  <rect width="1024" height="1024" fill="#f4efe4"/>

  <!-- Medallion outline -->
  <circle cx="512" cy="512" r="380" stroke="#1a1f2a" stroke-width="16" fill="none"/>

  <!-- Waterline (solid) -->
  <line x1="180" y1="615" x2="844" y2="615" stroke="#1a1f2a" stroke-width="14"/>

  <!-- Depth contour (dashed) -->
  <line x1="180" y1="695" x2="844" y2="695" stroke="#1a1f2a" stroke-width="8" stroke-dasharray="20 38"/>

  <!-- Fishing hook — vertical shaft + curved bottom + horizontal extension -->
  <path d="M380 280 L380 560 Q380 660 480 660 L600 660"
        stroke="#1a1f2a" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Hook barb (small triangle near the tip) -->
  <path d="M540 660 L600 660 L580 619"
        stroke="#1a1f2a" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Walleye gold "eye" — the brand accent, kept large for legibility at small sizes -->
  <circle cx="664" cy="384" r="44" fill="#c89a3c"/>
</svg>
